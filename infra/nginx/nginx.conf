events {}

http {
  upstream web_app { server web:3000; }
  upstream auth_service { server auth-service:4001; }
  upstream booking_service { server booking-service:4002; }
  upstream equipment_service { server equipment-service:4003; }
  upstream pricing_service { server pricing-service:4004; }
  upstream payment_service { server payment-service:4005; }
  upstream notification_service { server notification-service:4006; }
  upstream analytics_service { server analytics-service:4007; }
  upstream display_service { server display-service:4008; }

  server {
    listen 80;

    location / {
      proxy_pass http://web_app;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/auth/ { proxy_pass http://auth_service/api/auth/; }
    location /api/bookings/ { proxy_pass http://booking_service/api/bookings/; }
    location /api/equipment/ { proxy_pass http://equipment_service/api/equipment/; }
    location /api/pricing/ { proxy_pass http://pricing_service/api/pricing/; }
    location /api/payments/ { proxy_pass http://payment_service/api/payments/; }
    location /api/notifications/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_pass http://notification_service/api/notifications/;
    }
    location /socket.io/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_pass http://notification_service/socket.io/;
    }
    location /api/analytics/ { proxy_pass http://analytics_service/api/analytics/; }
    location /api/display/ { proxy_pass http://display_service/api/display/; }
  }
}
