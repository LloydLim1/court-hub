apiVersion: v1
kind: Namespace
metadata:
  name: courthub
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: courthub-config
  namespace: courthub
data:
  NEXT_PUBLIC_NOTIFICATION_URL: "https://api.courthub.local"
  DATABASE_URL: "postgres://postgres:postgres@postgres.courthub.svc.cluster.local:5432/courthub"
  REDIS_URL: "redis://redis.courthub.svc.cluster.local:6379"
  MONGO_URL: "mongodb://mongo.courthub.svc.cluster.local:27017/courthub_logs"
---
apiVersion: v1
kind: Secret
metadata:
  name: courthub-secrets
  namespace: courthub
type: Opaque
stringData:
  JWT_SECRET: "replace-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: courthub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: courthub/web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: courthub-config
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: courthub
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: courthub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: gateway-config
          configMap:
            name: gateway-nginx-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-config
  namespace: courthub
data:
  nginx.conf: |
    events {}
    http {
      upstream web_app { server web:3000; }
      upstream auth_service { server auth-service:4001; }
      upstream booking_service { server booking-service:4002; }
      upstream equipment_service { server equipment-service:4003; }
      upstream pricing_service { server pricing-service:4004; }
      upstream payment_service { server payment-service:4005; }
      upstream notification_service { server notification-service:4006; }
      upstream analytics_service { server analytics-service:4007; }
      upstream display_service { server display-service:4008; }
      server {
        listen 80;
        location / { proxy_pass http://web_app; }
        location /api/auth/ { proxy_pass http://auth_service/api/auth/; }
        location /api/bookings/ { proxy_pass http://booking_service/api/bookings/; }
        location /api/equipment/ { proxy_pass http://equipment_service/api/equipment/; }
        location /api/pricing/ { proxy_pass http://pricing_service/api/pricing/; }
        location /api/payments/ { proxy_pass http://payment_service/api/payments/; }
        location /api/notifications/ { proxy_pass http://notification_service/api/notifications/; }
        location /socket.io/ { proxy_pass http://notification_service/socket.io/; }
        location /api/analytics/ { proxy_pass http://analytics_service/api/analytics/; }
        location /api/display/ { proxy_pass http://display_service/api/display/; }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: courthub
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-registry
  namespace: courthub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-registry
  template:
    metadata:
      labels:
        app: api-registry
    spec:
      containers:
        - name: api-registry
          image: courthub/api-gateway:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
---
apiVersion: v1
kind: Service
metadata:
  name: api-registry
  namespace: courthub
spec:
  selector:
    app: api-registry
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: courthub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: courthub/auth-service:latest
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: courthub-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: courthub
spec:
  selector:
    app: auth-service
  ports:
    - port: 4001
      targetPort: 4001
