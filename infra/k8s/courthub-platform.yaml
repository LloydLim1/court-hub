---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: courthub-ingress
  namespace: courthub
spec:
  ingressClassName: nginx
  rules:
    - host: app.courthub.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 80
